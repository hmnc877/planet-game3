<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>惑星ブロック崩し</title>
<style>
  :root{
    --bg-deep:#0a0e27;
    --bg-deep2:#050714;
    --purple:#6c4adb;
    --pink:#ff5fa2;
    --cyan:#4ad4ff;
    --gold:#ffc94a;
    --green:#36e2a0;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--bg-deep2);
    font-family:'Courier New', monospace;
    touch-action:none;
  }
  #wrap{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 20% 10%, rgba(108,74,219,0.25), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,95,162,0.18), transparent 40%),
      var(--bg-deep2);
  }
  #stage{ position:relative; }
  canvas{
    display:block;
    border-radius:18px;
    box-shadow:0 0 0 1px rgba(255,255,255,0.08), 0 20px 60px rgba(0,0,0,0.6), 0 0 80px rgba(108,74,219,0.15);
    background:var(--bg-deep);
  }
  #hud{
    position:absolute; top:14px; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:0 18px;
    color:#dfe6ff;
    pointer-events:none;
    letter-spacing:1px;
  }
  #score{
    font-size:22px; font-weight:700; color:var(--gold);
    text-shadow:0 0 12px rgba(255,201,74,0.6);
  }
  #scoreLabel{ font-size:10px; color:#8a93c9; letter-spacing:3px; display:block; margin-bottom:2px;}
  #balls{
    font-size:13px; color:var(--cyan); text-align:right;
    text-shadow:0 0 8px rgba(74,212,255,0.5);
  }
  #ballsLabel{ font-size:10px; color:#8a93c9; letter-spacing:3px; display:block; margin-bottom:2px;}
  #msgOverlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(5,7,20,0.78);
    color:#fff; text-align:center; gap:14px;
    border-radius:18px;
    transition:opacity 0.3s;
  }
  #msgOverlay h1{
    font-size:24px; margin:0; color:var(--pink);
    text-shadow:0 0 18px rgba(255,95,162,0.7);
    letter-spacing:2px;
  }
  #msgOverlay p{ margin:0; font-size:13px; color:#aab2e0; max-width:260px; line-height:1.6; }
  #msgOverlay button{
    margin-top:10px;
    background:linear-gradient(135deg, var(--purple), var(--pink));
    border:none; color:#fff; font-family:inherit; font-weight:700;
    font-size:14px; letter-spacing:2px;
    padding:12px 28px; border-radius:30px;
    box-shadow:0 6px 20px rgba(108,74,219,0.5);
  }
  #hint{
    position:absolute; bottom:8px; left:0; right:0;
    text-align:center; font-size:10px; color:#5c6499; letter-spacing:1px;
    pointer-events:none;
  }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="hud">
      <div><span id="scoreLabel">SCORE</span><span id="score">0</span></div>
      <div><span id="ballsLabel">BALL</span><span id="balls">●●●</span></div>
    </div>
    <div id="msgOverlay">
      <h1 id="msgTitle">惑星ブロック崩し</h1>
      <p id="msgText">指で左右にドラッグしてパドルを操作。<br>星座のように散らばったブロックを全部壊そう。<br>壊すと惑星が弾けて飛び散る！<br>たまにアイテムが落ちてくるよ。</p>
      <button id="startBtn">START</button>
    </div>
    <div id="hint">パドルをドラッグして操作</div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // ---- Layout ----
  const W = 380, H = 680;
  function resize(){
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H, 1.0) * 0.96;
    canvas.style.width = (W*scale)+'px';
    canvas.style.height = (H*scale)+'px';
  }
  canvas.width = W; canvas.height = H;
  window.addEventListener('resize', resize);
  resize();

  // ---- Game state ----
  let score = 0;
  let ballsLeft = 3;
  let running = false;
  let level = 1;

  const scoreEl = document.getElementById('score');
  const ballsEl = document.getElementById('balls');
  const overlay = document.getElementById('msgOverlay');
  const msgTitle = document.getElementById('msgTitle');
  const msgText = document.getElementById('msgText');
  const startBtn = document.getElementById('startBtn');

  function updateHud(){
    scoreEl.textContent = score.toString().padStart(5,'0');
    ballsEl.textContent = '●'.repeat(Math.max(ballsLeft-1,0)) + (ballsLeft>0?'○':'');
  }

  // ---- Playfield bounds ----
  const margin = 14;
  const playLeft = margin, playRight = W - margin, playTop = 60, playBottom = H - 16;

  // ---- Paddle ----
  const paddleBaseW = 70;
  const paddle = {
    w: paddleBaseW, h: 12,
    x: W/2 - paddleBaseW/2, y: H - 70,
    minX: playLeft, maxX: playRight - paddleBaseW
  };

  // ---- Ball(s) ----
  // `ball` is the primary ball (controls launch-from-paddle state). Extra
  // balls from the multi-ball power-up live in `balls` and are simple
  // physics bodies once spawned.
  function freshBall(){
    return {
      x: W/2, y: paddle.y - 14,
      vx: 3.2 * (Math.random() < 0.5 ? -1 : 1),
      vy: -6.2,
      r: 7,
      trail: [],
      launched: false
    };
  }
  let ball = freshBall();
  let balls = []; // extra multi-ball companions (primary `ball` not included here)

  // ---- Level themes ----
  // Each level cycles through a themed palette of "planets" so progressing
  // feels like moving through different regions of space.
  const themes = [
    { name:'太陽系', bg:'#0a0e27', accent:'#ffc94a',
      skins:[
        { color:'#ff9f4a', ring:false }, // mercury/mars-ish
        { color:'#ffd27a', ring:false }, // venus
        { color:'#4ad4ff', ring:false }, // earth
        { color:'#ff6b4a', ring:false }, // mars
        { color:'#e8b06a', ring:true  }, // saturn
        { color:'#c9915c', ring:true  }, // jupiter band
      ]},
    { name:'銀河', bg:'#120a27', accent:'#ff5fa2',
      skins:[
        { color:'#ff5fa2', ring:false },
        { color:'#a85fff', ring:true  },
        { color:'#6c4adb', ring:false },
        { color:'#ff8ad1', ring:true  },
        { color:'#7d5fff', ring:false },
        { color:'#c45fff', ring:true  },
      ]},
    { name:'星雲', bg:'#06241f', accent:'#36e2a0',
      skins:[
        { color:'#36e2a0', ring:false },
        { color:'#4affc4', ring:true  },
        { color:'#1fb37e', ring:false },
        { color:'#7dffd4', ring:false },
        { color:'#2de0b0', ring:true  },
        { color:'#5cffae', ring:false },
      ]},
    { name:'氷の領域', bg:'#0a1a27', accent:'#4ad4ff',
      skins:[
        { color:'#4ad4ff', ring:false },
        { color:'#a0e8ff', ring:true  },
        { color:'#7fc7ff', ring:false },
        { color:'#cdf3ff', ring:false },
        { color:'#5ab0e0', ring:true  },
        { color:'#8fe0ff', ring:false },
      ]},
  ];
  function currentTheme(){
    return themes[(level-1) % themes.length];
  }

  // ---- Particles (brick break fragments) ----
  let particles = [];
  function spawnParticles(x, y, color, count){
    for(let i=0;i<count;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = 1.5 + Math.random()*3.5;
      particles.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - 1, // slight upward bias
        r: 1.5 + Math.random()*2,
        color,
        life: 1,
        decay: 0.02 + Math.random()*0.02
      });
    }
  }
  function updateParticles(){
    for(const p of particles){
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12; // gravity
      p.vx *= 0.98;
      p.life -= p.decay;
    }
    particles = particles.filter(p => p.life > 0);
  }
  function drawParticles(){
    for(const p of particles){
      ctx.save();
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ---- Power-ups ----
  // Falls from a broken brick; paddle catch activates its effect.
  const POWERUP_TYPES = [
    { id:'wide',  color:'#4ad4ff', label:'W' }, // wider paddle
    { id:'multi', color:'#ffc94a', label:'M' }, // splits ball into 3
    { id:'pierce',color:'#ff5fa2', label:'P' }, // ball pierces bricks for a while
  ];
  let powerups = []; // falling pickups: {x,y,type}
  let paddleWideTimer = 0;
  let pierceTimer = 0;

  function maybeDropPowerup(x, y){
    if(Math.random() < 0.18){
      const type = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
      powerups.push({ x, y, vy: 1.8, type });
    }
  }

  function activatePowerup(type){
    if(type.id === 'wide'){
      paddleWideTimer = 480; // ~8s at 60fps
    } else if(type.id === 'pierce'){
      pierceTimer = 300; // ~5s
    } else if(type.id === 'multi'){
      const extras = [];
      for(let i=0;i<2;i++){
        const nb = freshBall();
        nb.launched = true;
        nb.x = ball.x; nb.y = ball.y;
        const baseAngle = Math.atan2(ball.vy, ball.vx);
        const spread = (i===0?-1:1) * 0.45;
        const speed = Math.hypot(ball.vx, ball.vy) || 6;
        nb.vx = Math.cos(baseAngle+spread)*speed;
        nb.vy = Math.sin(baseAngle+spread)*speed;
        extras.push(nb);
      }
      balls.push(...extras);
    }
  }

  // ---- Bricks: scattered constellation-style layout ----
  // Instead of a rigid grid, place bricks at irregular positions that still
  // avoid overlap, like stars sketched into a constellation.
  let bricks = [];
  function generateBricks(){
    bricks = [];
    const zoneTop = playTop + 14;
    const zoneBottom = 300;
    const brickW = 34, brickH = 16;
    const count = 26 + Math.min(level*2, 14);
    const placed = [];
    let attempts = 0;
    while(placed.length < count && attempts < count*40){
      attempts++;
      const x = playLeft + 6 + Math.random()*(playRight - playLeft - brickW - 12);
      const y = zoneTop + Math.random()*(zoneBottom - zoneTop - brickH);
      // reject if overlapping an existing brick (with padding)
      let ok = true;
      for(const b of placed){
        if(x < b.x + brickW + 6 && x + brickW + 6 > b.x &&
           y < b.y + brickH + 6 && y + brickH + 6 > b.y){
          ok = false; break;
        }
      }
      if(!ok) continue;
      const theme = currentTheme();
      const skin = theme.skins[Math.floor(Math.random()*theme.skins.length)];
      placed.push({
        x, y, w: brickW, h: brickH,
        alive: true,
        hp: Math.random() < 0.18 ? 2 : 1,
        skin,
        reveal: 0 // 0..1, drives the "planet pops out" flash animation
      });
    }
    bricks = placed;
  }
  generateBricks();

  // faint constellation lines connecting nearby bricks (purely decorative)
  function constellationLines(){
    const lines = [];
    for(let i=0;i<bricks.length;i++){
      let nearest = null, nd = Infinity;
      for(let j=0;j<bricks.length;j++){
        if(i===j) continue;
        const a = bricks[i], b = bricks[j];
        const dx=(a.x+a.w/2)-(b.x+b.w/2), dy=(a.y+a.h/2)-(b.y+b.h/2);
        const d = dx*dx+dy*dy;
        if(d < nd){ nd = d; nearest = j; }
      }
      if(nearest !== null && nd < 80*80){
        lines.push([i, nearest]);
      }
    }
    return lines;
  }
  let conLines = constellationLines();

  // ---- Input: drag paddle ----
  // Pointer Events unify touch/mouse/pen into one API. This matters because
  // some embedded viewers (e.g. opening the file directly from a phone's
  // Files app) run a stripped-down WebView where touchstart/touchmove don't
  // always fire reliably, but pointer events are far more consistently
  // supported across these contexts.
  let activeId = null;
  canvas.style.touchAction = 'none';
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointercancel', onPointerUp);

  function canvasPoint(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    const sx = W / rect.width, sy = H / rect.height;
    return { x: (clientX - rect.left)*sx, y: (clientY - rect.top)*sy };
  }

  function movePaddleTo(x){
    paddle.x = Math.max(paddle.minX, Math.min(paddle.maxX, x - paddle.w/2));
    if(!ball.launched){
      ball.x = paddle.x + paddle.w/2;
    }
  }

  function onPointerDown(e){
    e.preventDefault();
    activeId = e.pointerId;
    if(canvas.setPointerCapture){
      try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
    }
    const p = canvasPoint(e.clientX, e.clientY);
    movePaddleTo(p.x);
    if(!running) return;
    if(!ball.launched) ball.launched = true;
  }
  function onPointerMove(e){
    if(e.pointerId !== activeId) return;
    e.preventDefault();
    movePaddleTo(canvasPoint(e.clientX, e.clientY).x);
  }
  function onPointerUp(e){
    if(e.pointerId !== activeId) return;
    activeId = null;
  }

  // Last-resort fallback: if some restricted viewer doesn't dispatch pointer
  // events at all, a basic click at least lets the player launch the ball
  // and nudge the paddle toward the tapped X position.
  canvas.addEventListener('click', function(e){
    const p = canvasPoint(e.clientX, e.clientY);
    movePaddleTo(p.x);
    if(running && !ball.launched) ball.launched = true;
  });

  // ---- Physics ----
  function addScore(pts){
    score += pts;
    updateHud();
  }

  function resetBallOnPaddle(){
    ball = freshBall();
    balls = [];
    powerups = [];
    paddleWideTimer = 0;
    pierceTimer = 0;
    paddle.w = paddleBaseW;
    paddle.maxX = playRight - paddle.w;
  }

  function ballLost(){
    ballsLeft--;
    updateHud();
    if(ballsLeft <= 0){
      running = false;
      msgTitle.textContent = 'GAME OVER';
      msgText.innerHTML = `スコア: <b style="color:#ffc94a">${score}</b><br>もう一度挑戦しよう！`;
      startBtn.textContent = 'RETRY';
      overlay.classList.remove('hidden');
    } else {
      resetBallOnPaddle();
    }
  }

  function levelClear(){
    running = false;
    level++;
    msgTitle.textContent = 'CLEAR!';
    msgText.innerHTML = `スコア: <b style="color:#ffc94a">${score}</b><br>次の星座へ進もう`;
    startBtn.textContent = 'NEXT';
    overlay.classList.remove('hidden');
  }

  function rectCircleCollide(b, ball){
    const cx = Math.max(b.x, Math.min(ball.x, b.x+b.w));
    const cy = Math.max(b.y, Math.min(ball.y, b.y+b.h));
    const dx = ball.x - cx, dy = ball.y - cy;
    const dist = Math.hypot(dx,dy);
    if(dist < ball.r){
      if(pierceTimer <= 0){
        // determine bounce axis by penetration depth
        const overlapX = Math.min(ball.x + ball.r - b.x, b.x + b.w - (ball.x - ball.r));
        const overlapY = Math.min(ball.y + ball.r - b.y, b.y + b.h - (ball.y - ball.r));
        if(overlapX < overlapY){
          ball.vx *= -1;
          ball.x += ball.x < b.x + b.w/2 ? -overlapX : overlapX;
        } else {
          ball.vy *= -1;
          ball.y += ball.y < b.y + b.h/2 ? -overlapY : overlapY;
        }
      }
      return true;
    }
    return false;
  }

  function stepBall(b, isPrimary){
    b.x += b.vx;
    b.y += b.vy;

    b.trail.push({x:b.x, y:b.y});
    if(b.trail.length > 12) b.trail.shift();

    // walls
    if(b.x - b.r < playLeft){ b.x = playLeft + b.r; b.vx *= -1; }
    if(b.x + b.r > playRight){ b.x = playRight - b.r; b.vx *= -1; }
    if(b.y - b.r < playTop){ b.y = playTop + b.r; b.vy *= -1; }

    // paddle
    if(b.vy > 0 &&
       b.y + b.r > paddle.y && b.y + b.r < paddle.y + paddle.h + 10 &&
       b.x > paddle.x - b.r && b.x < paddle.x + paddle.w + b.r){
      b.y = paddle.y - b.r;
      const hitPos = (b.x - (paddle.x + paddle.w/2)) / (paddle.w/2); // -1..1
      const speed = Math.hypot(b.vx, b.vy);
      const maxAngle = Math.PI/3;
      const angle = hitPos * maxAngle;
      b.vx = speed * Math.sin(angle);
      b.vy = -Math.abs(speed * Math.cos(angle));
      const newSpeed = Math.min(speed * 1.03, 11);
      const s2 = Math.hypot(b.vx, b.vy);
      b.vx = b.vx/s2*newSpeed;
      b.vy = b.vy/s2*newSpeed;
    }

    // bricks
    for(const brick of bricks){
      if(!brick.alive) continue;
      if(rectCircleCollide(brick, b)){
        brick.hp--;
        const theme = currentTheme();
        if(brick.hp <= 0){
          brick.alive = false;
          brick.reveal = 1; // trigger planet pop animation
          addScore(brick.skin.ring ? 150 : 100);
          spawnParticles(brick.x+brick.w/2, brick.y+brick.h/2, brick.skin.color, 10);
          maybeDropPowerup(brick.x+brick.w/2, brick.y+brick.h/2);
        } else {
          addScore(40);
          spawnParticles(brick.x+brick.w/2, brick.y+brick.h/2, brick.skin.color, 4);
        }
        if(pierceTimer <= 0) break; // one brick per frame unless piercing
      }
    }

    return b.y - b.r <= playBottom + 40; // still alive (hasn't fallen past bottom)
  }

  function update(){
    if(!running) return;

    // power-up timers
    if(paddleWideTimer > 0){
      paddleWideTimer--;
      paddle.w = paddleBaseW * 1.5;
      if(paddleWideTimer === 0) paddle.w = paddleBaseW;
    }
    if(pierceTimer > 0) pierceTimer--;
    paddle.maxX = playRight - paddle.w;
    if(paddle.x > paddle.maxX) paddle.x = paddle.maxX;

    if(!ball.launched){
      ball.x = paddle.x + paddle.w/2;
      ball.y = paddle.y - 14;
    } else {
      const stillIn = stepBall(ball, true);
      if(!stillIn){
        // primary ball lost; if extra balls remain, promote one to primary
        if(balls.length > 0){
          ball = balls.shift();
        } else {
          ballLost();
          return;
        }
      }
    }

    // extra balls
    for(let i=balls.length-1; i>=0; i--){
      const stillIn = stepBall(balls[i], false);
      if(!stillIn) balls.splice(i,1);
    }

    for(const b of bricks){
      if(b.reveal > 0) b.reveal = Math.max(0, b.reveal - 0.018);
    }

    updateParticles();

    // falling power-up pickups
    for(let i=powerups.length-1; i>=0; i--){
      const p = powerups[i];
      p.y += p.vy;
      // caught by paddle?
      if(p.y + 8 > paddle.y && p.y < paddle.y + paddle.h &&
         p.x > paddle.x && p.x < paddle.x + paddle.w){
        activatePowerup(p.type);
        powerups.splice(i,1);
        continue;
      }
      if(p.y > playBottom) powerups.splice(i,1);
    }

    // win check
    if(bricks.every(b => !b.alive)){
      levelClear();
    }
  }

  // ---- Drawing ----
  let frame = 0;
  function drawBackground(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#0a0e27';
    ctx.fillRect(0,0,W,H);
    for(let i=0;i<70;i++){
      const sx = (i*53.7)%W;
      const sy = (i*97.3 + (i*13)%40)%H;
      const tw = 0.4 + 0.6*Math.abs(Math.sin(i*12.9 + frame*0.02));
      ctx.fillStyle = `rgba(255,255,255,${0.15+0.35*tw})`;
      ctx.fillRect(sx, sy, 1.4, 1.4);
    }
  }

  function drawBounds(){
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(playLeft, playTop);
    ctx.lineTo(playRight, playTop);
    ctx.moveTo(playLeft, playTop);
    ctx.lineTo(playLeft, H);
    ctx.moveTo(playRight, playTop);
    ctx.lineTo(playRight, H);
    ctx.stroke();
    ctx.restore();
  }

  function drawConstellation(){
    ctx.save();
    ctx.strokeStyle = 'rgba(108,74,219,0.18)';
    ctx.lineWidth = 1;
    for(const [i,j] of conLines){
      const a = bricks[i], b = bricks[j];
      if(!a.alive && !b.alive) continue;
      ctx.beginPath();
      ctx.moveTo(a.x+a.w/2, a.y+a.h/2);
      ctx.lineTo(b.x+b.w/2, b.y+b.h/2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBrick(b){
    if(b.alive){
      ctx.save();
      const cx = b.x+b.w/2, cy = b.y+b.h/2;
      ctx.fillStyle = b.hp > 1 ? '#dfe6ff' : 'rgba(255,255,255,0.85)';
      ctx.shadowColor = b.skin.color;
      ctx.shadowBlur = 6;
      const r = 4;
      ctx.beginPath();
      ctx.moveTo(b.x+r, b.y);
      ctx.arcTo(b.x+b.w, b.y, b.x+b.w, b.y+b.h, r);
      ctx.arcTo(b.x+b.w, b.y+b.h, b.x, b.y+b.h, r);
      ctx.arcTo(b.x, b.y+b.h, b.x, b.y, r);
      ctx.arcTo(b.x, b.y, b.x+b.w, b.y, r);
      ctx.closePath();
      ctx.fill();
      if(b.hp > 1){
        ctx.fillStyle = b.skin.color;
        ctx.font = 'bold 9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(b.hp, cx, cy+3);
      }
      ctx.restore();
    } else if(b.reveal > 0){
      // planet pop-out flash: scales up then fades
      const t = b.reveal; // 1 -> 0
      const cx = b.x + b.w/2, cy = b.y + b.h/2;
      const scale = 1 + (1-t)*0.6;
      const alpha = t;
      const pr = (b.w*0.42) * scale;
      ctx.save();
      ctx.globalAlpha = alpha;
      const grad = ctx.createRadialGradient(cx,cy,1, cx,cy,pr*1.8);
      grad.addColorStop(0, b.skin.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, pr*1.8, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = b.skin.color;
      ctx.beginPath();
      ctx.arc(cx, cy, pr, 0, Math.PI*2);
      ctx.fill();

      if(b.skin.ring){
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.ellipse(cx, cy, pr*1.5, pr*0.5, -0.4, 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawPaddle(){
    ctx.save();
    ctx.fillStyle = '#4ad4ff';
    ctx.shadowColor = '#4ad4ff';
    ctx.shadowBlur = 10;
    const r = 6;
    ctx.beginPath();
    ctx.moveTo(paddle.x+r, paddle.y);
    ctx.arcTo(paddle.x+paddle.w, paddle.y, paddle.x+paddle.w, paddle.y+paddle.h, r);
    ctx.arcTo(paddle.x+paddle.w, paddle.y+paddle.h, paddle.x, paddle.y+paddle.h, r);
    ctx.arcTo(paddle.x, paddle.y+paddle.h, paddle.x, paddle.y, r);
    ctx.arcTo(paddle.x, paddle.y, paddle.x+paddle.w, paddle.y, r);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawBall(b){
    for(let i=0;i<b.trail.length;i++){
      const t = b.trail[i];
      const alpha = (i/b.trail.length)*0.4;
      ctx.fillStyle = `rgba(255,201,74,${alpha})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, b.r*0.7, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.save();
    ctx.shadowColor = '#fff7d6';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#fff7d6';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawPowerups(){
    for(const p of powerups){
      ctx.save();
      ctx.fillStyle = p.type.color;
      ctx.shadowColor = p.type.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 9, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#0a0e27';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(p.type.label, p.x, p.y+3);
      ctx.restore();
    }
  }

  let bannerTimer = 0;
  let bannerText = '';
  function showBanner(text){
    bannerText = text;
    bannerTimer = 110;
  }

  function draw(){
    drawBackground();
    drawBounds();
    drawConstellation();
    for(const b of bricks) drawBrick(b);
    drawParticles();
    drawPowerups();
    drawPaddle();
    if(running){
      if(ball.launched) drawBall(ball);
      for(const b of balls) drawBall(b);
    }

    if(running && !ball.launched){
      ctx.save();
      ctx.fillStyle = 'rgba(74,212,255,0.55)';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('TAP TO LAUNCH', W/2, paddle.y - 30);
      ctx.restore();
    }

    if(pierceTimer > 0){
      ctx.save();
      ctx.fillStyle = 'rgba(255,95,162,0.7)';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('PIERCE', playLeft+4, playTop-8);
      ctx.restore();
    }
    if(paddleWideTimer > 0){
      ctx.save();
      ctx.fillStyle = 'rgba(74,212,255,0.7)';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('WIDE', playRight-4, playTop-8);
      ctx.restore();
    }

    if(bannerTimer > 0){
      bannerTimer--;
      const alpha = bannerTimer > 20 ? 1 : bannerTimer/20;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(5,7,20,0.5)';
      ctx.fillRect(0, H/2-26, W, 52);
      ctx.fillStyle = currentTheme().accent;
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.shadowColor = currentTheme().accent;
      ctx.shadowBlur = 14;
      ctx.fillText(bannerText, W/2, H/2+7);
      ctx.restore();
    }

    frame++;
  }

  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // ---- Start / Reset ----
  function startGame(){
    if(startBtn.textContent === 'NEXT'){
      generateBricks();
      conLines = constellationLines();
    } else {
      score = 0; ballsLeft = 3; level = 1;
      generateBricks();
      conLines = constellationLines();
    }
    running = true;
    resetBallOnPaddle();
    particles = [];
    updateHud();
    overlay.classList.add('hidden');
    showBanner(currentTheme().name);
  }
  startBtn.addEventListener('click', startGame);

  updateHud();
  loop();
})();
</script>
</body>
